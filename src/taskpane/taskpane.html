<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Excel Add-in</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
    <style>
        body { font-family: Segoe UI, sans-serif; font-size: 13px; margin: 0; padding: 0; }
        header { background: #0078d4; color: white; padding: 12px 16px; }
        header h1 { margin: 0; font-size: 16px; }
        main { padding: 12px 16px; }
        button {
            background: #0078d4; color: white; border: none;
            padding: 7px 14px; cursor: pointer; border-radius: 3px;
            font-size: 12px; margin-top: 6px;
        }
        button:hover { background: #005fa3; }
        button.secondary {
            background: white; color: #0078d4;
            border: 1px solid #0078d4; margin-left: 6px;
        }
        button.secondary:hover { background: #f0f6ff; }
        #status { color: gray; font-size: 12px; margin: 8px 0; min-height: 16px; }
        #breadcrumb { font-size: 12px; color: #555; margin-bottom: 6px; }
        #breadcrumb span { cursor: pointer; color: #0078d4; }
        #breadcrumb span:hover { text-decoration: underline; }
        #file-browser { border: 1px solid #ddd; border-radius: 3px; max-height: 280px; overflow-y: auto; }
        .browser-item {
            display: flex; align-items: center; padding: 7px 10px;
            cursor: pointer; border-bottom: 1px solid #f0f0f0;
        }
        .browser-item:hover { background: #f0f6ff; }
        .browser-item .icon { margin-right: 8px; font-size: 16px; }
        .browser-item .name { flex: 1; }
        .browser-item.selected { background: #deeeff; }
        #selected-file { font-size: 12px; color: #333; margin: 8px 0; padding: 6px; background: #f8f8f8; border-radius: 3px; display: none; }
        table { border-collapse: collapse; width: 100%; font-size: 12px; }
        th, td { border: 1px solid #ccc; padding: 4px 8px; }
        th { background: #f3f3f3; }
        #output-section { margin-top: 12px; }
        .user-bar { font-size: 12px; color: #555; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <header>
        <h1>Excel Add-in</h1>
    </header>

    <main>
        <!-- Sign in -->
        <div id="sign-in-section">
            <p>Sign in with your Microsoft 365 account to get started.</p>
            <button id="sign-in-btn">Sign In</button>
        </div>

        <!-- Signed in -->
        <div id="main-section" style="display:none;">
            <div class="user-bar">
                <span>Signed in as <b id="user-name"></b></span>
                <button class="secondary" id="sign-out-btn">Sign Out</button>
            </div>

            <p style="margin: 0 0 6px 0; font-weight: 600;">Select a file from OneDrive:</p>

            <div id="breadcrumb">📁 <span data-id="root">My Files</span></div>
            <div id="file-browser">
                <div style="padding: 12px; color: gray;">Loading...</div>
            </div>

            <div id="selected-file">📄 <span id="selected-file-name"></span></div>

            <div id="status"></div>

            <button id="read-file-btn" style="display:none;">Read Selected File</button>

            <div id="output-section" style="display:none;">
                <p style="font-weight: 600; margin: 12px 0 6px 0;">Data from Sheet1:</p>
                <div style="overflow-x: auto;"><div id="output"></div></div>
            </div>
        </div>
    </main>
</body>
</html>

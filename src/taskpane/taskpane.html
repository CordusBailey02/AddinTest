<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=Edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Excel Add-in</title>
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    <link rel="stylesheet" href="https://res-1.cdn.office.net/files/fabric-cdn-prod_20230815.002/office-ui-fabric-core/11.1.0/css/fabric.min.css"/>
    <link href="taskpane.css" rel="stylesheet" type="text/css" />
</head>
<body class="ms-font-m ms-Fabric">

    <header class="ms-welcome__header ms-bgColor-neutralLighter" style="padding: 16px; text-align: center;">
        <h1 class="ms-font-xl">Excel Add-in</h1>
    </header>

    <main style="padding: 16px;">

        <!-- Sign in -->
        <div id="sign-in-section">
            <p class="ms-font-m">Sign in with your Microsoft 365 account to get started.</p>
            <button id="sign-in-btn" class="ms-Button ms-Button--primary">
                <span class="ms-Button-label">Sign In</span>
            </button>
        </div>

        <!-- Signed in -->
        <div id="main-section" style="display: none;">
            <p class="ms-font-m">Signed in as: <b><span id="user-name"></span></b></p>

            <hr/>

            <p class="ms-font-m">Enter the path to an Excel file in SharePoint:</p>
            <input id="file-path" type="text" class="ms-TextField-field"
                placeholder="/sites/YourSite/Shared Documents/YourFile.xlsx"
                style="width: 100%; margin-bottom: 8px; padding: 6px;" />

            <button id="read-file-btn" class="ms-Button ms-Button--primary" style="margin-bottom: 16px;">
                <span class="ms-Button-label">Read File</span>
            </button>

            <div id="status" class="ms-font-s" style="margin-bottom: 8px; color: gray;"></div>

            <div id="output-section" style="display: none;">
                <h3 class="ms-font-l">Data from Sheet1:</h3>
                <div id="output" style="overflow-x: auto;"></div>
            </div>

            <button id="sign-out-btn" class="ms-Button" style="margin-top: 24px;">
                <span class="ms-Button-label">Sign Out</span>
            </button>
        </div>

    </main>

</body>
</html>
